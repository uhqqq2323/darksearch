<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkSearcher Chat - Global Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e1a;
      --bg-light: #0f1420;
      --bg-hover: #141d2f;
      --border: #1a2847;
      --border-glow: #2d4a7b;
      --text: #e0e6ff;
      --text-dim: #7a8fb3;
      --cyan: #00d9ff;
      --purple: #b537f2;
      --accent: #ff6b35;
      --success: #00ff88;
      --error: #ff4757;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg) 0%, #0d1628 100%);
      font-family: 'Courier Prime', monospace;
      color: var(--text);
      overflow: hidden;
    }

    #container {
      display: flex;
      height: 100vh;
      flex-direction: column;
      background: radial-gradient(ellipse at 50% 0%, rgba(45, 74, 123, 0.1) 0%, transparent 70%);
    }

    /* HEADER */
    .header {
      padding: 20px 30px;
      border-bottom: 2px solid var(--border);
      background: rgba(10, 14, 26, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 217, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
      font-family: 'Audiowide', sans-serif;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
      animation: pulse 2s infinite;
    }

    .status-dot.offline {
      background: var(--error);
      box-shadow: 0 0 12px var(--error);
    }

    .user-count {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
      background: rgba(45, 74, 123, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-glow);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* CHAT AREA */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border-glow);
      border-radius: 3px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: var(--cyan);
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.4s ease;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.own {
      justify-content: flex-end;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
      border: 1px solid var(--cyan);
    }

    .message.own .avatar {
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
    }

    .message-bubble {
      max-width: 55%;
      background: rgba(20, 29, 47, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      position: relative;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .message.own .message-bubble {
      background: linear-gradient(135deg, rgba(181, 55, 242, 0.15), rgba(255, 107, 53, 0.1));
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.1);
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message-user {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--cyan);
      font-weight: 700;
    }

    .message.own .message-user {
      color: var(--accent);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      word-wrap: break-word;
    }

    .message-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* INPUT AREA */
    .input-area {
      padding: 20px 30px;
      border-top: 2px solid var(--border);
      background: rgba(10, 14, 26, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 -8px 32px rgba(0, 217, 255, 0.05);
      position: relative;
    }

    .input-area::before {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }

    .input-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      background: rgba(15, 20, 32, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      resize: none;
      max-height: 100px;
    }

    .input-field:focus {
      border-color: var(--cyan);
      background: rgba(15, 20, 32, 0.9);
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
    }

    .input-field::placeholder {
      color: var(--text-dim);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
      pointer-events: none;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 217, 255, 0.3);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .delay-timer {
      font-size: 11px;
      color: var(--accent);
      text-align: center;
      min-width: 50px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 20px;
      color: var(--text-dim);
      text-align: center;
    }

    .empty-icon {
      font-size: 80px;
      opacity: 0.3;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .empty-text {
      font-size: 14px;
      max-width: 300px;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .message-bubble {
        max-width: 85%;
      }

      .header-title {
        font-size: 18px;
        letter-spacing: 2px;
      }

      .messages {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- HEADER -->
    <div class="header">
      <div class="header-content">
        <div class="header-title">
          <div class="header-icon">💬</div>
          <span>LIVE CHAT</span>
        </div>
        <div class="header-right">
          <div class="status-badge">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Chargement...</span>
          </div>
          <div class="user-count">
            <span id="user-count">-</span> utilisateurs
          </div>
        </div>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-container">
      <div class="messages" id="messages">
        <div class="empty-state">
          <div class="loading-spinner"></div>
          <div class="empty-text">Connexion à Firebase en cours...</div>
        </div>
      </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <div class="input-wrap">
        <input 
          type="text" 
          class="input-field" 
          id="message-input" 
          placeholder="Tapez votre message... (2s délai)"
          autocomplete="off"
          disabled
        >
        <div class="delay-timer" id="delay-timer"></div>
        <button class="send-btn" id="send-btn" title="Envoyer (Entrée)" disabled>→</button>
      </div>
    </div>
  </div>

  <script>
    const SEND_DELAY = 2000; // 2 secondes

    let db = null;
    let currentUserId = localStorage.getItem('darksearch_user_id') || generateUserId();
    let currentUser = {
      id: currentUserId,
      name: 'User ' + currentUserId.slice(0, 6).toUpperCase(),
      avatar: generateAvatar()
    };
    let lastSendTime = 0;
    let isConnected = false;
    let activeUsers = new Set();
    let messagesContainer = document.getElementById('messages');
    let unsubscribeMessages = null;

    localStorage.setItem('darksearch_user_id', currentUserId);

    // ── FIREBASE INIT ──
    async function initFirebase() {
      try {
        const firebaseConfig = {
          apiKey: "AIzaSyBTONse0C0Yw2nJoL3uqtpqFlhOewBc-4M",
          authDomain: "darksearcher-33468.firebaseapp.com",
          projectId: "darksearcher-33468",
          storageBucket: "darksearcher-33468.firebasestorage.app",
          messagingSenderId: "717210037208",
          appId: "1:717210037208:web:5b706dc3a03f7994b360ad"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }

        db = firebase.firestore();
        isConnected = true;
        updateStatus(true);
        console.log('✅ Firebase connecté');

        // Écouter les messages
        listenToMessages();
        
        // Enregistrer l'utilisateur actif
        registerActiveUser();

        // Initialiser les champs
        document.getElementById('message-input').disabled = false;
        document.getElementById('send-btn').disabled = false;

      } catch (error) {
        console.error('❌ Erreur Firebase:', error);
        updateStatus(false);
        showError('Erreur de connexion à Firebase');
      }
    }

    // ── LISTENER MESSAGES ──
    function listenToMessages() {
      if (!db) return;

      if (unsubscribeMessages) unsubscribeMessages();

      unsubscribeMessages = db.collection('chat_messages')
        .orderBy('timestamp', 'asc')
        .limit(100)
        .onSnapshot(
          (snapshot) => {
            renderMessages(snapshot.docs);
            updateActiveUsers();
          },
          (error) => {
            console.error('❌ Erreur lecture messages:', error);
            updateStatus(false);
          }
        );
    }

    // ── ENREGISTRER UTILISATEUR ACTIF ──
    function registerActiveUser() {
      if (!db) return;

      const userRef = db.collection('active_users').doc(currentUserId);
      
      userRef.set({
        name: currentUser.name,
        avatar: currentUser.avatar,
        lastSeen: new Date(),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      // Mettre à jour tous les 10 secondes
      setInterval(() => {
        userRef.update({
          lastSeen: new Date(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(err => console.warn('Erreur update utilisateur:', err));
      }, 10000);

      // Nettoyer quand l'utilisateur ferme l'onglet
      window.addEventListener('beforeunload', () => {
        userRef.delete().catch(err => console.warn('Erreur delete utilisateur:', err));
      });
    }

    // ── COMPTER UTILISATEURS ACTIFS ──
    function updateActiveUsers() {
      if (!db) return;

      db.collection('active_users')
        .where('lastSeen', '>', new Date(Date.now() - 60000))
        .get()
        .then((snapshot) => {
          activeUsers = new Set();
          snapshot.forEach((doc) => {
            activeUsers.add(doc.id);
          });
          document.getElementById('user-count').textContent = activeUsers.size || 1;
        })
        .catch(err => console.warn('Erreur count users:', err));
    }

    // ── AFFICHER MESSAGES ──
    function renderMessages(docs) {
      if (docs.length === 0) {
        messagesContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🚀</div>
            <div class="empty-text">Connecté à la communauté DarkSearcher<br/>Soyez le premier à envoyer un message...</div>
          </div>
        `;
        return;
      }

      messagesContainer.innerHTML = docs.map((doc, idx) => {
        const msg = doc.data();
        const isOwn = msg.userId === currentUserId;
        const delay = idx * 0.05;
        const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString('fr-FR', { 
          hour: '2-digit', 
          minute: '2-digit', 
          second: '2-digit' 
        }) : '--:--:--';

        return `
          <div class="message ${isOwn ? 'own' : ''}" style="animation-delay: ${delay}s">
            ${!isOwn ? `<div class="avatar">${msg.avatar}</div>` : ''}
            <div class="message-bubble">
              <div class="message-content">
                <div class="message-user">${escapeHtml(msg.userName)}</div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div class="message-time">${time}</div>
              </div>
            </div>
            ${isOwn ? `<div class="avatar">${msg.avatar}</div>` : ''}
          </div>
        `;
      }).join('');

      // Scroll to bottom
      setTimeout(() => {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, 0);
    }

    // ── ENVOYER MESSAGE ──
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();

      if (!text) return;
      if (!db) {
        showError('Firebase non connecté');
        return;
      }

      const now = Date.now();
      const timeSinceLastSend = now - lastSendTime;

      if (timeSinceLastSend < SEND_DELAY) {
        const remaining = Math.ceil((SEND_DELAY - timeSinceLastSend) / 1000);
        showDelayWarning(remaining);
        return;
      }

      try {
        await db.collection('chat_messages').add({
          text: text,
          userId: currentUserId,
          userName: currentUser.name,
          avatar: currentUser.avatar,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        input.value = '';
        lastSendTime = now;
        startDelayTimer();
        input.focus();

      } catch (error) {
        console.error('❌ Erreur envoi:', error);
        showError('Erreur lors de l\'envoi du message');
      }
    }

    // ── TIMER DÉLAI ──
    function startDelayTimer() {
      const btn = document.getElementById('send-btn');
      const timer = document.getElementById('delay-timer');
      btn.disabled = true;

      let remaining = 2;
      timer.textContent = remaining + 's';

      const interval = setInterval(() => {
        remaining--;
        timer.textContent = remaining + 's';

        if (remaining <= 0) {
          clearInterval(interval);
          btn.disabled = false;
          timer.textContent = '';
        }
      }, 1000);
    }

    function showDelayWarning(seconds) {
      const timer = document.getElementById('delay-timer');
      timer.textContent = `${seconds}s`;
    }

    function updateStatus(connected) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');

      if (connected) {
        dot.classList.remove('offline');
        text.textContent = 'En ligne';
      } else {
        dot.classList.add('offline');
        text.textContent = 'Hors ligne';
      }
    }

    function showError(msg) {
      console.error(msg);
      // Optionnel: afficher une notification
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function generateUserId() {
      return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function generateAvatar() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      return letters[Math.floor(Math.random() * letters.length)];
    }

    // ── EVENT LISTENERS ──
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('message-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── INIT ──
    window.addEventListener('load', initFirebase);
  </script>
</body>
</html>
